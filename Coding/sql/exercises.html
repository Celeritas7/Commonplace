  var STATES = ["not_started", "in_progress", "done"];
  var LABEL = { not_started: "Not started", in_progress: "In progress", done: "Done ✓" };
  var PILL  = { not_started: "not", in_progress: "prog", done: "done" };

  var progress = load();
  var filterState = "all";
  var sb = null, session = null;
  try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }); } catch (e) {}

  function load() { try { return JSON.parse(localStorage.getItem(KEY) || "{}"); } catch (e) { return {}; } }
  function save() { try { localStorage.setItem(KEY, JSON.stringify(progress)); } catch (e) {} }
  function statusOf(k) { return progress[k] || "not_started"; }
  function byId(id) { return document.getElementById(id); }

  function groupByModule() {
    var out = {};
    EXERCISES.forEach(function (e) {
      if (!out[e.m]) out[e.m] = [];
      out[e.m].push(e);
    });
    return out;
  }

  function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function render() {
    var grouped = groupByModule();
    var html = "";
    Object.keys(grouped).map(Number).sort(function (a, b) { return a - b; }).forEach(function (m) {
      var ex = grouped[m];
      var done = ex.filter(function (e) { return statusOf(e.k) === "done"; }).length;
      var filtered = ex.filter(function (e) { return filterState === "all" || statusOf(e.k) === filterState; });
      if (filtered.length === 0) return;
      html += '<div class="mod-section" data-m="' + m + '">';
      html += '<div class="mod-head" onclick="this.parentElement.classList.toggle(\'collapsed\')">';
      html += '<span class="num">Module ' + m + '</span>';
      html += '<h3>' + MODULES[m] + '</h3>';
      html += '<span class="progress">' + done + ' / ' + ex.length + '</span>';
      html += '<span class="chevron">▾</span>';
      html += '</div>';
      html += '<div class="mod-list">';
      filtered.forEach(function (e) {
        var s = statusOf(e.k);
        html += '<div class="ex-row ' + (s === "done" ? "done" : "") + '">';
        html += '<span class="ex-num">' + e.id + '</span>';
        html += '<span class="ex-name">' + escapeHtml(e.t.replace(/^Challenge [0-9.]+ —\s*/, "")) + '</span>';
        html += '<button class="pill ' + PILL[s] + '" data-k="' + e.k + '">' + LABEL[s] + '</button>';
        html += '<a class="open-link" href="' + e.u + '" data-k="' + e.k + '">Open ↗</a>';
        html += '</div>';
      });
      html += '</div></div>';
    });
    byId("modules").innerHTML = html;

    Array.prototype.forEach.call(document.querySelectorAll(".pill[data-k]"), function (b) {
      b.onclick = function (e) { e.stopPropagation(); cycle(b.getAttribute("data-k")); };
    });
    Array.prototype.forEach.call(document.querySelectorAll(".open-link[data-k]"), function (a) {
      a.onclick = function (e) { e.stopPropagation(); var k = a.getAttribute("data-k"); if (statusOf(k) === "not_started") setStatus(k, "in_progress"); };
    });

    updateSummary();
  }

  function updateSummary() {
    var counts = { not_started: 0, in_progress: 0, done: 0 };
    EXERCISES.forEach(function (e) { counts[statusOf(e.k)]++; });
    byId("prog-count").textContent = counts.done + " / " + EXERCISES.length + " done";
    byId("prog-fill").style.width = (counts.done / EXERCISES.length * 100) + "%";
    byId("breakdown").innerHTML =
      '<span><span class="dot d-not"></span>' + counts.not_started + ' not started</span>' +
      '<span><span class="dot d-prog"></span>' + counts.in_progress + ' in progress</span>' +
      '<span><span class="dot d-done"></span>' + counts.done + ' done</span>';
  }

  function cycle(k) { var c = statusOf(k); setStatus(k, STATES[(STATES.indexOf(c) + 1) % STATES.length]); }
  function setStatus(k, s) { progress[k] = s; save(); render(); syncOne(k, s); }

  function syncOne(k, s) {
    if (!sb || !session) return;
    var ex = EXERCISES.filter(function (x) { return x.k === k; })[0]; if (!ex) return;
    var now = new Date().toISOString();
    sb.from("commonplace_external_resources").upsert({
      user_id: session.user.id, resource_set: RESOURCE_SET, item_key: k, name: ex.t, url: ex.u,
      order_index: EXERCISES.indexOf(ex), status: s, last_attempted: now, updated_at: now
    }, { onConflict: "user_id,resource_set,item_key" }).then(function () {}, function () {});
  }

  function syncNote() {
    byId("sync-note").textContent = session
      ? "✓ Synced to your account"
      : "Saved on this device · sign in via the Practice Lab to sync across devices";
  }

  function syncOnSignIn() {
    if (!sb || !session) return;
    sb.from("commonplace_external_resources").select("item_key,status").eq("resource_set", RESOURCE_SET)
      .then(function (res) {
        if (!res.error && res.data) {
          var remote = {};
          res.data.forEach(function (r) { remote[r.item_key] = r.status; progress[r.item_key] = r.status; });
          save(); render();
          Object.keys(progress).forEach(function (k) {
            if (progress[k] && progress[k] !== "not_started" && !(k in remote)) syncOne(k, progress[k]);
          });
        }
      });
  }

  Array.prototype.forEach.call(document.querySelectorAll(".filter"), function (btn) {
    btn.onclick = function () {
      Array.prototype.forEach.call(document.querySelectorAll(".filter"), function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      filterState = btn.dataset.filter;
      render();
    };
  });

  byId("reset-btn").onclick = function () {
    if (!confirm("Clear all exercise progress on this device? (Synced progress on your account isn't affected.)")) return;
    progress = {}; save(); render();
  };

  render();
  if (sb) {
    sb.auth.getSession().then(function (res) { session = res.data.session || null; syncNote(); syncOnSignIn(); });
    sb.auth.onAuthStateChange(function (_e, s) { session = s; syncNote(); syncOnSignIn(); });
  } else { syncNote(); }
})();
</script>
